<p-dialog
    [modal]="true"
    [(visible)]="visible"
    [closable]="false"
    [style]="{ width: '50rem', height: '80vh', display: 'flex', flexDirection: 'column' }">

    <ng-template pTemplate="header">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%">
            <span style="flex-grow: 1;"><h3>Manage Filters</h3></span>
            <button pButton icon="pi pi-times" (click)="visible.set(false)" style="margin-left: auto;"></button>
        </div>
    </ng-template>

    <!-- Top Controls -->
    <div class="flex justify-between p-3">
        <p-button
            label="Add Filter"
            icon="pi pi-plus"
            severity="primary"
            (click)="newFilter()">
        </p-button>
        <button
            pButton
            icon="pi pi-play"
            severity="secondary"
            label="Apply all to month"
            (click)="applyAllFiltersToMonthClicked()">
        </button>
        <button
            pButton
            icon="pi pi-play"
            severity="secondary"
            label="Apply all everywhere"
            (click)="applyAllFiltersToAllClicked()">
        </button>
    </div>

    <!-- Scrollable Rows -->
    <div class="filter-rows" style="flex: 1 1 auto; overflow-y: auto; padding: 0.5rem 1rem; display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 0.75rem; align-items: center;">
        @for(filter of boardState.filters$(); track filter; let i = $index){
            <!-- Subject Input -->
            <p-floatlabel variant="on" style="width: 100%;">
                <input
                    pInputText
                    [(ngModel)]="filter.subject_substring"
                    id="subject-{{ i }}"
                    autocomplete="off"
                    style="width: 100%;"
                />
                <label for="subject-{{ i }}" class="text-sm text-gray-500">
                    Subject contains
                </label>
            </p-floatlabel>

            <!-- Category Select -->
            <p-select
                [(ngModel)]="filter.lane_id"
                [options]="boardState.lanes$()"
                optionLabel="name"
                optionValue="id"
                placeholder="Move to Lane"
                style="width: 100%;"
                appendTo="body"
            ></p-select>

            <!-- Play Button -->
            <button
                pButton
                icon="pi pi-play"
                class="p-button-sm p-button-text"
                (click)="applyFilterClicked(i)">
            </button>

            <!-- Delete Button -->
            <button
                pButton
                icon="pi pi-trash"
                class="p-button-sm p-button-danger p-button-text"
                (click)="deleteFilterClicked(i)">
            </button>
        }
    </div>

    <!-- Sticky Footer -->
    <div class="p-dialog-footer flex justify-end gap-2" style="flex-shrink: 0; padding: 1rem;">
        <p-button
            label="Cancel"
            severity="secondary"
            (click)="visible.set(false)">
        </p-button>
        <p-button
            label="Save"
            (click)="saveClicked(); visible.set(false)">
        </p-button>
    </div>

</p-dialog>
