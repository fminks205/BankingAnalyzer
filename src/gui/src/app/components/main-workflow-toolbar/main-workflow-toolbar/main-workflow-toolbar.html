<p-toolbar>
  <div class="toolbar-flex">
        <div class="toolbar-section start">
            <button pButton (click)="openUploadReportsDialogClick()" label="Upload Reports"></button>
            <span class="pi pi-arrow-right"></span>
            <button pButton (click)="openProcessReportsDialogClick()" label="Process Reports"></button>
            <span class="pi pi-arrow-right"></span>
            <button pButton (click)="openNewLaneDialogClick()" label="Add Lane"></button>
            <span class="pi pi-arrow-right"></span>
            <button pButton (click)="openFiltersDialogClick()" label="Filter"></button>
        </div>

        <div class="toolbar-section center">
            <button pButton (click)="onClickSave()" label="Save Assignments"></button>
        </div>

        <div class="toolbar-section end">
            <button pButton (click)="createDashboardClick()" label="Create dashboard"></button>
        </div>
  </div>
</p-toolbar>
