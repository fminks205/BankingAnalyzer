<h2 class="text-3xl font-bold underline">
	Kontoauszug {{report.month}}/{{report.year}}
</h2>
<div cdkDropListGroup>
	<div class="example-container">
		<h2>Nicht zugewiesen</h2>

		<div
			cdkDropList
			[cdkDropListData]="todo"
			class="example-list"
			(cdkDropListDropped)="drop($event)">
			@for (item of todo; track item) {
				<div class="example-box" cdkDrag>
					{{item.amount}}
					<br>
					{{item.subject}}
				</div>
			}
		</div>
	</div>

	@for(ddlane of dragDropLanes; track ddlane){
		<div class="example-container">
			<h2>{{ddlane.lane.name}}</h2>
			<div
				cdkDropList
				[cdkDropListData]="ddlane.entries"
				class="example-list"
				(cdkDropListDropped)="drop($event)">
				@for (item of ddlane.entries; track item) {
					<div class="example-box" cdkDrag>
						{{item.amount}}
						<br>
						{{item.subject}}
					</div>
				}
			</div>
		</div>
	}

</div>
