<h2 class="text-3xl font-bold underline">
	Kontoauszug {{report.month}}/{{report.year}}
</h2>
<div cdkDropListGroup class="board-container">
	<div class="example-container" style="flex: 1; display: flex; flex-direction: column;">
		<h2>Nicht zugewiesen</h2>

		<div
			cdkDropList
			[cdkDropListData]="unassignedTodos"
			class="example-list"
			(cdkDropListDropped)="drop($event, undefined)"
			style="flex: 1; display: flex; flex-direction: column;">
			@for (item of unassignedTodos; track item) {
				<div class="example-box" 
					cdkDrag 
					[cdkDragData]="item">
					{{item.amount}}
					<br>
					{{item.subject}}
				</div>
			}
		</div>
	</div>

	@for(ddlane of dragDropLanes$(); track ddlane){
		<div class="example-container" style="flex: 1; display: flex; flex-direction: column;">
			<h2>
				{{ddlane.lane.name}}
				<button pButton
					(click)="onClickRemoveLane(ddlane)">
					<i class="pi pi-trash" pButtonIcon></i>
				</button>
			</h2>
			<div
				cdkDropList
				[cdkDropListData]="ddlane.entries"
				class="example-list"
				(cdkDropListDropped)="drop($event, ddlane)"
				style="flex: 1; display: flex; flex-direction: column;">
				@for (item of ddlane.entries; track item) {
					<div class="example-box" 
						cdkDrag 
						[cdkDragData]="item">
						{{item.amount}}
						<br>
						{{item.subject}}
					</div>
				}
			</div>
		</div>
	}
</div>
