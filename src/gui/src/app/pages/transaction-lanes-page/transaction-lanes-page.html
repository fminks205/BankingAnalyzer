<p-toolbar>
  <div class="toolbar-flex">
        <div class="toolbar-section start">
            <button pButton (click)="openUploadReportsDialogClick()" label="Upload Reports"></button>
            <span class="pi pi-arrow-right"></span>
            <button pButton (click)="openProcessReportsDialogClick()" label="Process Reports"></button>
            <span class="pi pi-arrow-right"></span>
            <button pButton (click)="openNewLaneDialogClick()" label="Add Lane"></button>
            <span class="pi pi-arrow-right"></span>
            <button pButton (click)="openFiltersDialogClick()" label="Filter"></button>
        </div>

        <div class="toolbar-section center">
            <button pButton (click)="onClickSave()" label="Save Assignments"></button>
        </div>

        <div class="toolbar-section end">
            <button pButton (click)="createDashboardClick()" label="Create dashboard"></button>
        </div>
  </div>
</p-toolbar>

<div class="flex gap-2 overflow-x-auto p-2 border-round surface-100">
	@for(report of assignmentsHolder.reports$(); track report){
		<p-button
			[label]="report.month + ' ' + report.year"
			[severity]="report === selectedReport ? 'primary' : 'secondary'"
			size="small"
			(onClick)="setSelectedReport(report)">
		</p-button>
	}
</div>


<app-transaction-category-drag-drop
	[hidden]="selectedReport == undefined"
	[report]="selectedReport ?? {year: -1, month: -1, entries: []}"
></app-transaction-category-drag-drop>

<p-dialog header="Upload Reports" [modal]="true" [(visible)]="uploadReportsDialogVisible" [style]="{ width: '30rem' }">
	<div class="p-fluid" style="display: flex; flex-direction: column; justify-content: center; align-items:baseline; gap: 1rem;">
		<span class="p-text-secondary block mb-4 text-center">Upload Reports</span>
		<div class="flex justify-end gap-2" style="width: 100%; max-width: 400px;">
			<p-button label="Cancel" severity="secondary" (click)="uploadReportsDialogVisible = false" />
			<p-button label="Save" (click)="uploadReportsDialogVisible = false" />
		</div>
	</div>
</p-dialog>

<p-dialog header="Process Reports" [modal]="true" [(visible)]="processReportsDialogVisible" [style]="{ width: '30rem' }">
	<div class="p-fluid" style="display: flex; flex-direction: column; justify-content: center; align-items:baseline; gap: 1rem;">
		<span class="p-text-secondary block mb-4 text-center">Process Reports</span>
		<div class="flex justify-end gap-2" style="width: 100%; max-width: 400px;">
			<p-button label="Cancel" severity="secondary" (click)="processReportsDialogVisible = false" />
			<p-button label="Request Processing" (click)="processReportsDialogVisible = false; workflowService.parse_reports()" />
		</div>
	</div>
</p-dialog>

<p-dialog header="Add Lane" [modal]="true" [(visible)]="newLaneDialogVisible" [style]="{ width: '30rem' }">
	<div class="p-fluid" style="display: flex; flex-direction: column; justify-content: center; align-items:baseline; gap: 1rem;">
		<span class="p-text-secondary block mb-4 text-center">Create a new lane and confirm your changes</span>
		<p-floatlabel variant="on" style="width: 100%; max-width: 400px;">
			<input pInputText [(ngModel)]="newLaneName" id="lanename" class="w-full" autocomplete="off" style="width: 100%;" />
			<label for="lanename" class="text-sm text-gray-500 block">Lane Name</label>
		</p-floatlabel>
		<p-floatlabel variant="on" style="width: 100%; max-width: 400px;">
			<textarea pInputTextarea [(ngModel)]="newLaneDescription" id="description" class="w-full" rows="3" autocomplete="off" style="width: 100%;" ></textarea>
			<label for="description" class="text-sm text-gray-500 block">Description</label>
		</p-floatlabel>
		<div class="flex justify-end gap-2" style="width: 100%; max-width: 400px;">
			<p-button label="Cancel" severity="secondary" (click)="newLaneDialogVisible = false" />
			<p-button label="Save" (click)="newLaneDialogVisible = false; onClickAddLane(newLaneName, newLaneDescription)" />
		</div>
	</div>
</p-dialog>


<p-dialog 
    header="Manage Filters" 
    [modal]="true" 
    [(visible)]="newFilterDialogVisible" 
    [style]="{ width: '50rem', height: '80vh', display: 'flex', flexDirection: 'column' }">

    <!-- Top Controls -->
    <div class="flex justify-between p-3">
        <p-button 
            label="Add Filter" 
            icon="pi pi-plus" 
            severity="secondary"
            (click)="newFilter()">
        </p-button>
        <button 
            pButton 
            icon="pi pi-play" 
            class="p-button-sm p-button-text"
            label="Apply all"
            (click)="applyAllFilters()">
        </button>
    </div>

    <!-- Scrollable Rows -->
    <div class="filter-rows" style="flex: 1 1 auto; overflow-y: auto; padding: 0.5rem 1rem; display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 0.75rem; align-items: center;">
        @for(filter of filterHolder.filters$(); track filter; let i = $index){
            <!-- Subject Input -->
            <p-floatlabel variant="on" style="width: 100%;">
                <input 
                    pInputText 
                    [(ngModel)]="filter.subject_substring" 
                    id="subject-{{ i }}" 
                    autocomplete="off" 
                    style="width: 100%;"
                />
                <label for="subject-{{ i }}" class="text-sm text-gray-500">
                    Subject contains
                </label>
            </p-floatlabel>

            <!-- Category Select -->
            <p-select
                [(ngModel)]="filter.lane_id"
                [options]="categoryOptions"
                optionLabel="name"
                optionValue="id"
                placeholder="Move to Lane"
                style="width: 100%;"
                appendTo="body"
            ></p-select>

            <!-- Play Button -->
            <button 
                pButton 
                icon="pi pi-play" 
                class="p-button-sm p-button-text"
                (click)="applyFilter(i)">
            </button>

            <!-- Delete Button -->
            <button 
                pButton 
                icon="pi pi-trash" 
                class="p-button-sm p-button-danger p-button-text"
                (click)="filterHolder.removeFilter(i)">
            </button>
        }
    </div>

    <!-- Sticky Footer -->
    <div class="p-dialog-footer flex justify-end gap-2" style="flex-shrink: 0; padding: 1rem;">
        <p-button 
            label="Cancel"
            severity="secondary" 
            (click)="newFilterDialogVisible = false">
        </p-button>
        <p-button 
            label="Save"
            (click)="filterHolder.save(); newFilterDialogVisible = false">
        </p-button>
    </div>

</p-dialog>
