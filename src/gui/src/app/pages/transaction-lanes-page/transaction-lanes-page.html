<p-toolbar>
	<ng-template #start>
	</ng-template>
	<ng-template #center>
		<button pButton (click)="onClickSave()" label="Save"></button>
	</ng-template>
	<ng-template #end>
		<button pButton (click)="openNewLaneDialogClick()" label="Add lane"></button>
		<button pButton (click)="createDashboardClick()" label="Create dashboard"></button>
	</ng-template>
</p-toolbar>

<div class="flex gap-2 overflow-x-auto p-2 border-round surface-100">
	@for(report of assignmentsHolder.reports$(); track report){
		<p-button
			[label]="report.month + ' ' + report.year"
			[severity]="report === selectedReport ? 'primary' : 'secondary'"
			size="small"
			(onClick)="setSelectedReport(report)">
		</p-button>
	}
</div>


<app-transaction-category-drag-drop
	[hidden]="selectedReport == undefined"
	[report]="selectedReport ?? {year: -1, month: -1, entries: []}"
></app-transaction-category-drag-drop>

<p-dialog header="Add Lane" [modal]="true" [(visible)]="newLaneDialogVisible" [style]="{ width: '30rem' }">
	<div class="p-fluid" style="display: flex; flex-direction: column; justify-content: center; align-items:baseline; gap: 1rem;">
		<span class="p-text-secondary block mb-4 text-center">Create a new lane and confirm your changes</span>
		<p-floatlabel variant="on" style="width: 100%; max-width: 400px;">
			<input pInputText [(ngModel)]="newLaneName" id="lanename" class="w-full" autocomplete="off" style="width: 100%;" />
			<label for="lanename" class="text-sm text-gray-500 block">Lane Name</label>
		</p-floatlabel>
		<p-floatlabel variant="on" style="width: 100%; max-width: 400px;">
			<textarea pInputTextarea [(ngModel)]="newLaneDescription" id="description" class="w-full" rows="3" autocomplete="off" style="width: 100%;" ></textarea>
			<label for="description" class="text-sm text-gray-500 block">Description</label>
		</p-floatlabel>
		<div class="flex justify-end gap-2" style="width: 100%; max-width: 400px;">
			<p-button label="Cancel" severity="secondary" (click)="newLaneDialogVisible = false" />
			<p-button label="Save" (click)="newLaneDialogVisible = false; onClickAddLane(newLaneName, newLaneDescription)" />
		</div>
	</div>
</p-dialog>
