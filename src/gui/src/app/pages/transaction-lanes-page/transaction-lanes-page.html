<app-main-workflow-toolbar
    (onUploadReportsClick)="uploadReportsDialogVisible.set(true)"
    (onProcessReportsClick)="processReportsDialogVisible.set(true)"
    (onAddLaneClick)="newLaneDialogVisible.set(true)"
    (onFiltersClick)="newFilterDialogVisible.set(true)"

    (onSaveAssignmentsClick)="assignmentsHolder.saveState()"
    (onCreateDashboardClick)="dashboardCreator.createDashboard()"
>
</app-main-workflow-toolbar>


<div class="flex gap-2 overflow-x-auto p-2 border-round surface-100">
	@for(report of assignmentsHolder.reports$(); track report){
		<p-button
			[label]="report.month + ' ' + report.year"
			[severity]="report === selectedReport() ? 'primary' : 'secondary'"
			size="small"
			(onClick)="setSelectedReport(report)">
		</p-button>
	}
</div>


<app-transaction-category-drag-drop
	[hidden]="selectedReport == undefined"
	[report]="selectedReport()"
></app-transaction-category-drag-drop>

<app-upload-bankstatement-dialog
    [(visible)]="uploadReportsDialogVisible"
></app-upload-bankstatement-dialog>

<app-parse-reports-dialog
    [(visible)]="processReportsDialogVisible"
></app-parse-reports-dialog>

<app-add-lanes-dialog
    [(visible)]="newLaneDialogVisible"
></app-add-lanes-dialog>


<app-add-filters-dialog
    [(visible)]="newFilterDialogVisible"
    [report$]="selectedReport()"
    (appliedFilter)="reportDragDropLane.reloadDragDropMenu()"
></app-add-filters-dialog>
