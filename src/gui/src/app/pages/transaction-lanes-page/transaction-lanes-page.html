<app-main-workflow-toolbar
    (onUploadReportsClick)="state.uploadReportsDialogVisible.set(true)"
    (onProcessReportsClick)="state.processReportsDialogVisible.set(true)"
    (onAddLaneClick)="state.newLaneDialogVisible.set(true)"
    (onFiltersClick)="state.newFilterDialogVisible.set(true)"

    (onSaveAssignmentsClick)="assignmentsHolder.saveState()"
    (onCreateDashboardClick)="dashboardCreator.createDashboard()"
>
</app-main-workflow-toolbar>


<div class="flex gap-2 overflow-x-auto p-2 border-round surface-100">
	@for(report of assignmentsHolder.reports$(); track report){
		<p-button
			[label]="report.month + ' ' + report.year"
			[severity]="report === state.selectedReport$() ? 'primary' : 'secondary'"
			size="small"
			(onClick)="setSelectedReport(report)">
		</p-button>
	}
</div>


<app-transaction-category-drag-drop
	[hidden]="state.selectedReport$() == undefined"
	[report]="state.selectedReport$()"
></app-transaction-category-drag-drop>

<app-upload-bankstatement-dialog
    [(visible)]="state.uploadReportsDialogVisible"
></app-upload-bankstatement-dialog>

<app-parse-reports-dialog
    [(visible)]="state.processReportsDialogVisible"
></app-parse-reports-dialog>

<app-add-lanes-dialog
    [(visible)]="state.newLaneDialogVisible"
></app-add-lanes-dialog>

<app-add-filters-dialog
    [(visible)]="state.newFilterDialogVisible"
    (appliedFilter)="reportDragDropLane.reloadDragDropMenu()"
></app-add-filters-dialog>
