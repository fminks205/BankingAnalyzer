<div id="controls" style="padding: 10px; background:#222; color:#fff;">
    <label for="startRange">Start month:</label>
    <input type="range" id="startRange" min="0" max="0" step="1" value="0">

    <label for="endRange">End month:</label>
    <input type="range" id="endRange" min="0" max="0" step="1" value="0">

    <div>
        Visible range: <span id="rangeLabel"></span>
    </div>
</div>
